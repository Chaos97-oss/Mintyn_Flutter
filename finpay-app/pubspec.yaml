name: finpay
description: FinPay — production-ready fintech Flutter app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.2
  fl_chart: ^0.69.2
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  path: ^1.9.0
  pdf: ^3.11.1
  share_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_logo.png
  remove_alpha_ios: true
  adaptive_icon_background: "#1C1C1D"
  adaptive_icon_foreground: assets/app_logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/app_logo.png
    - assets/mastercard_logo.png
    - assets/card_bg.png
    - assets/card_chip.png
    - assets/profile_img.jpg
    - assets/recent_trf01.png
    - assets/recent_trf02.png
    - assets/recent_trf03.png
    - assets/recent_trf04.png
    - assets/line_chart_example.png
